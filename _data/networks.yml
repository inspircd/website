# Important things to remember when updating this list:
#
# * All networks MUST be sorted alphabetically in this file. The network page
#   will randomly shuffle the entries at load time.
# * All networks MUST support TLS and use a valid certificate.
# * All networks MUST have at least 10 human users and be at least 3 months old.
# * All networks are included at the discretion of the InspIRCd Team and we
#   reserve the right to reject networks that we feel violate the Project Rules
#   (https://docs.inspircd.org/rules/).

- name: HybridIRC
  contact: HybridIRC Administration <support@hybridirc.com>
  description: >-
    Next generation modern IRC network for free and open online communication.
  server:
    host: irc.hybridirc.com
    port: 6697
    chan: "#hybridirc"
  url: https://www.hybridirc.com

- name: InspIRCd Testnet
  contact: Sadie <sadie@witchery.services>
  description: >-
    The InspIRCd Testnet is the network used for testing the bleeding edge of
    InspIRCd features.
  server:
    host: testnet.inspircd.org
    port: 6697
    chan: "#testnet"
  url: https://testnet.inspircd.org

- name: IRC4Fun
  contact: siniStar <sinistar@irc4fun.net>
  description: >-
    IRC4Fun is an Internet Relay Chat network, founded in October of 2007. Our
    goal is to provide a quality, free, & fun chat service giving people all
    over the world a means for conversing with each other on friendly, secure
    and drama-free servers.
  server:
    host: irc.irc4fun.net
    port: 6697
    chan: "#IRC4Fun"
  url: https://irc4fun.net

- name: Teranova
  contact: Sadie <sadie@witchery.services>
  description: >-
    Teranova is a modern IRCv3 network which the home of the Anope and InspIRCd
    support channels.
  server:
    host: irc.teranova.net
    port: 6697
    chan: "#teranova"
  url: https://www.teranova.net
